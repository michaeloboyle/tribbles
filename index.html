// File Loading (drag & drop fallback)
// ─────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

dropZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

async function loadFile(file) {
  if (file.size > 100 * 1024 * 1024) {
    alert('File too large (>100MB). Please use a smaller session file.');
    return;
  }
  if (file.size > 50 * 1024 * 1024) {
    if (!confirm('This file is large (>50MB). Loading may be slow. Continue?')) return;
  }

  try {
    const text = await file.text();
    const parser = new SessionParser();
    const session = parser.parse(text);

    if (session.steps.length === 0) {
      alert('No visualizable steps found. Make sure it\'s a Claude Code session .jsonl file.');
      return;
    }

    showApp();
    initializeApp(session);
  } catch (err) {
    alert('Error loading file: ' + err.message);
  }
}

function showApp() {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

function showLanding() {
  document.getElementById('app').classList.add('hidden');
  document.getElementById('landing').classList.remove('hidden');
  document.getElementById('live-indicator').classList.remove('visible');
}

// ─────────────────────────────────────────────
// Session Browser (server mode)
// ─────────────────────────────────────────────
const API_BASE = window.location.origin;
let serverAvailable = false;

async function checkServer() {
  try {
    const resp = await fetch(API_BASE + '/api/sessions', { signal: AbortSignal.timeout(2000) });
    if (resp.ok) {
      serverAvailable = true;
      const sessions = await resp.json();
      renderSessionBrowser(sessions);
      // Show new session bar
      document.getElementById('new-session-bar').classList.remove('hidden');
      return sessions;
    }
  } catch {}
  return null;
}

function renderSessionBrowser(sessions) {
  const browser = document.getElementById('session-browser');
  const list = document.getElementById('session-list');
  browser.classList.remove('hidden');

  if (!sessions || sessions.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);padding:20px;text-align:center">No sessions found in ~/.claude/projects/</div>';
    return;
  }

  list.innerHTML = sessions.map(s => {
    const isActive = s.active;
    const toolChips = Object.entries(s.toolCounts || {}).slice(0, 6).map(([name, count]) => {
      const color = TOOL_COLORS[name] || '#6a6a8a';
      return `<span class="session-tool-chip" style="background:${color}">${name} ${count}</span>`;
    }).join('');

    const startDate = s.startTime ? new Date(s.startTime) : null;
    const dateStr = startDate ? startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
    const timeStr = startDate ? startDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';

    return `
      <div class="session-card ${isActive ? 'active-session' : ''}" data-id="${s.id}">
        <div class="session-status">
          ${isActive ? '<span class="live-dot"></span>' : '<span style="color:var(--text-dim);font-size:10px">' + dateStr + '</span>'}
          <span class="session-age">${isActive ? 'LIVE' : s.modifiedAgo}</span>
        </div>
        <div class="session-info">
          <div class="session-msg">${esc(s.firstMessage)}</div>
          <div class="session-meta">
            <span>${s.model}</span>
            <span>${s.stepEstimate} steps</span>
            <span>${s.sizeHuman}</span>
            ${timeStr ? `<span>${timeStr}</span>` : ''}
          </div>
          ${toolChips ? `<div class="session-tools">${toolChips}</div>` : ''}
        </div>
        <div class="session-actions">
          ${isActive ? `<button class="session-btn live-btn" data-action="live" data-id="${s.id}">Watch Live</button>` : ''}
          <button class="session-btn continue-btn" data-action="continue" data-id="${s.id}">Continue</button>
          <button class="session-btn" data-action="replay" data-id="${s.id}">Replay</button>
        </div>
      </div>`;
  }).join('');

  // Wire click handlers
  list.querySelectorAll('.session-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'live') startLive(id);
      else if (action === 'replay') startReplay(id);
      else if (action === 'continue') showContinueInput(btn, id);
    });
  });

  // Card click = replay (or live if active)
  list.querySelectorAll('.session-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const isActive = card.classList.contains('active-session');
      if (isActive) startLive(id);
      else startReplay(id);
    });
  });
}

function showContinueInput(btn, sessionId) {
  // Don't duplicate
  const card = btn.closest('.session-card');
  if (card.querySelector('.session-continue-input')) return;

  const row = document.createElement('div');
  row.className = 'session-continue-input';
  row.innerHTML = `
    <input type="text" placeholder="Enter a prompt..." autofocus>
    <button>Send</button>
  `;
  card.appendChild(row);

  const input = row.querySelector('input');
  const sendBtn = row.querySelector('button');

  // Prevent card click from navigating
  row.addEventListener('click', e => e.stopPropagation());
  input.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') doSend();
    if (e.key === 'Escape') row.remove();
  });

  function doSend() {
    const prompt = input.value.trim();
    if (!prompt) return;

    if (!promptManager) promptManager = new PromptManager();

    // Show the app, enter prompt flow
    showApp();
    promptManager.show();
    promptManager.input.value = prompt;
    promptManager.send(sessionId);
  }

  sendBtn.addEventListener('click', doSend);
  input.focus();
}

async function startReplay(sessionId) {
  try {
    const resp = await fetch(`${API_BASE}/api/session?id=${sessionId}`);
    if (!resp.ok) throw new Error('Failed to load session');
    const text = await resp.text();
    const parser = new SessionParser();
    const session = parser.parse(text);
    if (session.steps.length === 0) {
      alert('No visualizable steps in this session.');
      return;
    }
    showApp();
    initializeApp(session);
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

// ─────────────────────────────────────────────
// Live Mode (SSE streaming)
// ─────────────────────────────────────────────
let liveEventSource = null;

function startLive(sessionId) {
  // Close any existing live connection
  if (liveEventSource) {
    liveEventSource.close();
    liveEventSource = null;
  }

  showApp();
  document.getElementById('live-indicator').classList.add('visible');

  const parser = new SessionParser();
  let session = null;
  let graphModel = null;
  let renderer = null;
  let messageLog = null;
  let controller = null;
  let initialized = false;

  liveEventSource = new EventSource(`${API_BASE}/api/live?id=${sessionId}`);

  liveEventSource.addEventListener('init', (e) => {
    // Initial batch of all existing content
    const text = JSON.parse(e.data);
    session = parser.parse(text);

    graphModel = new GraphModel();
    renderer = new GraphRenderer(document.getElementById('graph'));
    messageLog = new MessageLog(document.getElementById('messages-container'));
    controller = new AnimationController(session, graphModel, renderer, messageLog);

    buildLegend();
    wireControls(controller, renderer);

    // Jump to end and show everything
    controller.jumpToEnd();
    initialized = true;

    // Fit view after settling
    setTimeout(() => renderer.fitView(), 1000);
  });

  liveEventSource.addEventListener('line', (e) => {
    if (!initialized || !session) return;

    // Parse the new line and add any new steps
    const lineText = JSON.parse(e.data);
    let entry;
    try { entry = JSON.parse(lineText); } catch { return; }

    // Re-parse to get new steps (quick approach: parse just this line)
    const miniText = lineText;
    const miniSession = parser.parse(miniText);

    for (const step of miniSession.steps) {
      // Re-index with correct step index
      step.index = session.steps.length;
      session.steps.push(step);

      // Apply the new step
      controller.model.addStepNodes(step);
      controller.messageLog.addStep(step);
      controller.updateAccumulators(step);
    }

    if (miniSession.steps.length > 0) {
      controller.currentStep = session.steps.length - 1;
      const visNodes = controller.model.getVisibleNodes(controller.currentStep);
      const visEdges = controller.model.getVisibleEdges(controller.currentStep);
      controller.renderer.render(visNodes, visEdges, controller.currentStep);
      controller.updateControls();
    }
  });

  liveEventSource.onerror = () => {
    // SSE reconnects automatically, but show a visual cue
    document.getElementById('live-indicator').style.opacity = '0.5';
    setTimeout(() => {
      document.getElementById('live-indicator').style.opacity = '1';
    }, 2000);
  };
}

function stopLive() {
  if (liveEventSource) {
    liveEventSource.close();
    liveEventSource = null;
  }
  document.getElementById('live-indicator').classList.remove('visible');
}

// ─────────────────────────────────────────────
// PromptManager
// ─────────────────────────────────────────────
class PromptManager {
  constructor() {
    this.pollTimer = null;
    this.bar = document.getElementById('prompt-bar');
    this.input = document.getElementById('prompt-input');
    this.sendBtn = document.getElementById('btn-send');
    this.stopBtn = document.getElementById('btn-stop-prompt');
    this.statusEl = document.getElementById('prompt-status');
    this.skipPermsCheckbox = document.getElementById('skip-permissions');
    this.outputBar = document.getElementById('claude-output-bar');
    this.outputText = document.getElementById('claude-output-text');
    this.respondInput = document.getElementById('respond-input');
    this.respondBtn = document.getElementById('btn-respond');

    this.sendBtn.addEventListener('click', () => this.send());
    this.stopBtn.addEventListener('click', () => this.stop());
    this.respondBtn.addEventListener('click', () => this.respond());

    // Prevent keyboard shortcuts when typing in prompt/respond inputs
    for (const input of [this.input, this.respondInput]) {
      input.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Enter') {
          e.preventDefault();
          if (input === this.input) this.send();
          else this.respond();
        }
      });
    }
  }

  show() {
    this.bar.classList.remove('hidden');
    this.bar.classList.add('visible');
  }

  hide() {
    this.bar.classList.add('hidden');
    this.bar.classList.remove('visible');
    this.hideOutputBar();
    this.stopPolling();
  }

  showOutputBar(text) {
    this.outputText.textContent = text;
    this.outputBar.classList.remove('hidden');
    this.respondInput.focus();
  }

  hideOutputBar() {
    this.outputBar.classList.add('hidden');
    this.respondInput.value = '';
  }

  async send(sessionId) {
    const prompt = this.input.value.trim();
    if (!prompt) return;

    const skipPermissions = this.skipPermsCheckbox.checked;

    this.sendBtn.disabled = true;
    this.statusEl.textContent = 'Starting...';
    this.sessionId = sessionId || (window.appController?.session?.sessionId);

    try {
      const resp = await fetch(API_BASE + '/api/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt,
          sessionId: this.sessionId,
          skipPermissions,
        }),
      });

      const result = await resp.json();
      if (!resp.ok) {
        this.statusEl.textContent = result.error || 'Failed';
        this.sendBtn.disabled = false;
        return;
      }

      this.sessionId = result.sessionId;
      this.input.value = '';
      this.statusEl.textContent = 'Running...';
      this.stopBtn.classList.remove('hidden');

      // Enter live mode for this session
      startLive(result.sessionId);

      // Start polling for completion and input requests
      this.startPolling();
    } catch (err) {
      this.statusEl.textContent = 'Error: ' + err.message;
      this.sendBtn.disabled = false;
    }
  }

  async respond() {
    const text = this.respondInput.value.trim();
    if (!text) return;

    try {
      const resp = await fetch(API_BASE + '/api/prompt/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      const result = await resp.json();
      if (result.ok) {
        this.respondInput.value = '';
        this.hideOutputBar();
        this.statusEl.textContent = 'Running...';
      } else {
        this.statusEl.textContent = 'Respond failed: ' + (result.error || '');
      }
    } catch (err) {
      this.statusEl.textContent = 'Respond error: ' + err.message;
    }
  }

  async stop() {
    try {
      await fetch(API_BASE + '/api/prompt/stop', { method: 'POST' });
      this.statusEl.textContent = 'Stopped';
      this.onComplete();
    } catch (err) {
      this.statusEl.textContent = 'Stop failed';
    }
  }

  startPolling() {
    this.stopPolling();
    this.pollTimer = setInterval(async () => {
      try {
        const resp = await fetch(API_BASE + '/api/prompt/status');
        const status = await resp.json();

        if (status.running) {
          if (status.waitingForInput) {
            // Show the last few output lines as the prompt
            const outputLines = status.output || [];
            const lastLines = outputLines.slice(-3).join('\n');
            this.statusEl.textContent = 'Waiting for input...';
            this.showOutputBar(lastLines || 'Claude is waiting for your response');
          } else {
            this.hideOutputBar();
            this.statusEl.textContent = `Running (${Math.round(status.elapsed || 0)}s)`;
          }
        } else {
          if (status.error) {
            this.statusEl.textContent = 'Error: ' + status.error.slice(0, 60);
          } else {
            this.statusEl.textContent = 'Completed';
          }
          this.onComplete();
        }
      } catch {
        // Server unavailable, stop polling
        this.onComplete();
      }
    }, 2000);
  }

  stopPolling() {
    if (this.pollTimer) {
      clearInterval(this.pollTimer);
      this.pollTimer = null;
    }
  }

  onComplete() {
    this.stopPolling();
    this.sendBtn.disabled = false;
    this.stopBtn.classList.add('hidden');
    this.hideOutputBar();
  }
}

let promptManager = null;

// ─────────────────────────────────────────────
// Wire controls (shared between replay and live)
// ─────────────────────────────────────────────
let keydownHandler = null;

function wireControls(controller, renderer) {
  document.getElementById('btn-play').addEventListener('click', () => controller.toggle());
  document.getElementById('btn-next').addEventListener('click', () => { controller.pause(); controller.stepForward(); });
  document.getElementById('btn-prev').addEventListener('click', () => { controller.pause(); controller.stepBack(); });
  document.getElementById('btn-start').addEventListener('click', () => controller.jumpToStart());
  document.getElementById('btn-end').addEventListener('click', () => controller.jumpToEnd());

  document.getElementById('speed-slider').addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    controller.setSpeed(val);
    document.getElementById('speed-label').textContent = val + 'ms';
  });

  document.getElementById('progress-slider').addEventListener('input', (e) => {
    controller.seekTo(parseInt(e.target.value));
  });

  document.getElementById('layout-select').addEventListener('change', (e) => {
    renderer.setLayout(e.target.value);
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    controller.pause();
    renderer.clear();
    stopLive();
    if (promptManager) promptManager.hide();
    showLanding();
    window.appController = null;
    document.getElementById('layout-select').value = 'force';
    if (keydownHandler) {
      document.removeEventListener('keydown', keydownHandler);
      keydownHandler = null;
    }
  });

  // Keyboard
  if (keydownHandler) document.removeEventListener('keydown', keydownHandler);
  keydownHandler = (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.code) {
      case 'Space': e.preventDefault(); controller.toggle(); break;
      case 'ArrowRight': e.preventDefault(); controller.pause(); controller.stepForward(); break;
      case 'ArrowLeft': e.preventDefault(); controller.pause(); controller.stepBack(); break;
      case 'Home': e.preventDefault(); controller.jumpToStart(); break;
      case 'End': e.preventDefault(); controller.jumpToEnd(); break;
      case 'KeyF': e.preventDefault(); renderer.fitView(); break;
    }
  };
  document.addEventListener('keydown', keydownHandler);
}

// ─────────────────────────────────────────────
// Refresh button
// ─────────────────────────────────────────────
document.getElementById('btn-refresh')?.addEventListener('click', async () => {
  const sessions = await checkServer();
  if (sessions) renderSessionBrowser(sessions);
});

// New session from landing page
document.getElementById('btn-new-session')?.addEventListener('click', () => {
  const input = document.getElementById('new-session-input');
  const prompt = input.value.trim();
  if (!prompt) return;
  if (!promptManager) promptManager = new PromptManager();
  showApp();
  promptManager.show();
  promptManager.input.value = prompt;
  promptManager.send(null); // null = new session
});

document.getElementById('new-session-input')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('btn-new-session')?.click();
  }
});

// ─────────────────────────────────────────────
// Startup
// ─────────────────────────────────────────────
(async function startup() {
  // Check if served from the local server
  const sessions = await checkServer();

  // Check URL hash for direct live link
  const hash = window.location.hash;
  if (hash.startsWith('#live=')) {
    const id = hash.slice(6);
    startLive(id);
  } else if (hash.startsWith('#replay=')) {
    const id = hash.slice(8);
    startReplay(id);
  }
})()
</script>
<script src="/devtools-bridge.js"></script>
