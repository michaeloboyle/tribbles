<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Session Visualizer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0f0f1a;
  --bg-panel: #141425;
  --bg-card: #1a1a35;
  --bg-card-active: #222245;
  --text: #d0d0e0;
  --text-dim: #6a6a8a;
  --text-bright: #f0f0ff;
  --border: #2a2a45;
  --accent-user: #4a90d9;
  --accent-read: #27ae60;
  --accent-write: #e67e22;
  --accent-edit: #f1c40f;
  --accent-bash: #e74c3c;
  --accent-search: #9b59b6;
  --accent-task: #e84393;
  --accent-web: #00b894;
  --accent-file: #74b9ff;
  --accent-text: #b0b0cc;
  --accent-thinking: #555577;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Landing ── */
#landing {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  height: 100vh;
  background: var(--bg);
  overflow-y: auto;
}

#landing.hidden { display: none; }

#drop-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 40px 60px;
  text-align: center;
  max-width: 560px;
  transition: all 0.3s ease;
  cursor: pointer;
}

#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--accent-user);
  background: rgba(74, 144, 217, 0.05);
}

#drop-zone h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

#drop-zone p {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 24px;
}

#drop-zone .hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 16px;
  opacity: 0.7;
}

#file-input {
  display: none;
}

#drop-zone label {
  display: inline-block;
  padding: 10px 24px;
  background: var(--accent-user);
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.2s;
}

#drop-zone label:hover { opacity: 0.85; }

/* ── App Layout ── */
#app {
  display: grid;
  grid-template-rows: 44px auto 1fr 28px;
  height: 100vh;
}

#app.hidden { display: none; }

/* ── Controls ── */
#controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 12px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.control-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.control-group.transport button {
  width: 32px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-card);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-family: inherit;
}

.control-group.transport button:hover {
  background: var(--bg-card-active);
  border-color: var(--accent-user);
}

.control-group.transport button:disabled {
  opacity: 0.3;
  cursor: default;
}

.control-group.transport button.playing {
  background: var(--accent-user);
  border-color: var(--accent-user);
  color: #fff;
}

.control-group.layout label {
  color: var(--text-dim);
  font-size: 11px;
}

.control-group.layout select {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  font-family: inherit;
  padding: 2px 6px;
  cursor: pointer;
}

.control-group.layout select:hover {
  border-color: var(--accent-user);
}

.control-group.speed label {
  color: var(--text-dim);
  font-size: 11px;
}

.control-group.speed input[type="range"] {
  width: 80px;
  accent-color: var(--accent-user);
  height: 4px;
}

#speed-label {
  color: var(--text-dim);
  font-size: 11px;
  min-width: 36px;
}

.control-group.progress {
  flex: 1;
  gap: 8px;
}

#step-counter {
  color: var(--text-dim);
  font-size: 11px;
  min-width: 70px;
  white-space: nowrap;
}

#progress-slider {
  flex: 1;
  accent-color: var(--accent-user);
  height: 4px;
}

.control-group.meta {
  gap: 10px;
}

#session-info {
  color: var(--text-dim);
  font-size: 10px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#btn-reset {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

#btn-reset:hover {
  background: var(--bg-card-active);
  color: var(--text);
}

/* ── Main Split ── */
#main {
  display: grid;
  grid-template-columns: 300px 1fr;
  overflow: hidden;
}

/* ── Message Log ── */
#message-log {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg-panel);
  overflow: hidden;
}

#message-log h2 {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  padding: 8px 12px 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}

#messages-container::-webkit-scrollbar {
  width: 5px;
}

#messages-container::-webkit-scrollbar-track {
  background: transparent;
}

#messages-container::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.msg-entry {
  padding: 6px 8px;
  margin-bottom: 2px;
  border-radius: 4px;
  font-size: 11px;
  line-height: 1.4;
  transition: opacity 0.3s, background 0.2s;
  cursor: pointer;
  border-left: 2px solid transparent;
}

.msg-entry:hover {
  background: var(--bg-card);
}

.msg-entry.active {
  background: var(--bg-card-active);
  border-left-color: var(--accent-user);
}

.msg-entry.dimmed {
  opacity: 0.45;
}

.msg-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}

.msg-role {
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.msg-role.user { color: var(--accent-user); }
.msg-role.assistant { color: var(--accent-text); }
.msg-role.result { color: var(--text-dim); }
.msg-role.thinking { color: var(--accent-thinking); }

.msg-time {
  color: var(--text-dim);
  font-size: 10px;
  margin-left: auto;
}

.msg-body {
  color: var(--text);
  word-break: break-word;
  white-space: pre-wrap;
  max-height: 80px;
  overflow: hidden;
}

.msg-body code {
  color: var(--text-bright);
  font-size: 10.5px;
}

.file-link {
  color: #74b9ff;
  text-decoration: none;
  cursor: pointer;
  border-bottom: 1px dotted #74b9ff44;
}
.file-link:hover {
  color: #a0d4ff;
  border-bottom-color: #74b9ff;
}

.result-body {
  color: var(--text-dim);
  font-size: 10px;
  max-height: 40px;
}

.thinking-body {
  color: var(--accent-thinking);
  font-style: italic;
  font-size: 10px;
  max-height: 40px;
}

.tool-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.3px;
}

.tool-badge.tool-read { background: var(--accent-read); }
.tool-badge.tool-write { background: var(--accent-write); }
.tool-badge.tool-edit { background: var(--accent-edit); color: #111; }
.tool-badge.tool-bash { background: var(--accent-bash); }
.tool-badge.tool-grep, .tool-badge.tool-glob { background: var(--accent-search); }
.tool-badge.tool-task { background: var(--accent-task); }
.tool-badge.tool-webfetch, .tool-badge.tool-websearch { background: var(--accent-web); }
.tool-badge.tool-notebookedit { background: var(--accent-edit); color: #111; }
.tool-badge.tool-default { background: var(--text-dim); }

/* ── Graph ── */
#graph-container {
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

#graph {
  width: 100%;
  height: 100%;
}

.node-group { cursor: grab; }
.node-group:active { cursor: grabbing; }

.node-label {
  fill: var(--text-bright);
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 9px;
  text-anchor: middle;
  pointer-events: none;
  dominant-baseline: central;
}

.node-sublabel {
  fill: var(--text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 7px;
  text-anchor: middle;
  pointer-events: none;
}

.edge-line {
  stroke-width: 1.5;
  fill: none;
}

.edge-flow {
  stroke: var(--border);
  stroke-dasharray: 4 3;
  stroke-width: 1;
  opacity: 0.4;
}

.edge-file-read { stroke: var(--accent-read); opacity: 0.6; }
.edge-file-write { stroke: var(--accent-write); opacity: 0.6; }
.edge-file-edit { stroke: var(--accent-edit); opacity: 0.6; }
.edge-file-search { stroke: var(--accent-search); opacity: 0.6; }
.edge-file-bash { stroke: var(--accent-bash); opacity: 0.4; }
.edge-file-default { stroke: var(--text-dim); opacity: 0.4; }
.edge-pipe { stroke: #e74c3c; stroke-width: 2; opacity: 0.5; stroke-dasharray: 2 2; }

/* ── Legend ── */
#legend {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: rgba(20, 20, 37, 0.9);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 10px;
  color: var(--text-dim);
  max-width: 360px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-rect {
  width: 12px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text);
  max-width: 400px;
  pointer-events: none;
  z-index: 100;
  display: none;
  line-height: 1.5;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

#tooltip .tt-title {
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 2px;
}

#tooltip .tt-detail {
  color: var(--text-dim);
  font-size: 10px;
  word-break: break-all;
}

/* ── Stats Bar ── */
#stats-bar {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 12px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-dim);
}

.stat-value {
  color: var(--text);
  font-weight: 500;
}

/* ── Session Browser ── */
#landing-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  max-height: 100vh;
  overflow-y: auto;
  padding: 40px 20px;
  width: 100%;
}

#new-session-bar {
  width: 100%;
  max-width: 800px;
  display: flex;
  justify-content: center;
}

#new-session-bar.hidden { display: none; }

#session-browser {
  width: 100%;
  max-width: 800px;
}

#session-browser.hidden { display: none; }

#browser-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

#browser-header h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
}

#btn-refresh {
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

#btn-refresh:hover {
  background: var(--bg-card-active);
  color: var(--text);
}

#session-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.session-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.session-card:hover {
  background: var(--bg-card-active);
  border-color: var(--accent-user);
  box-shadow: 0 0 12px rgba(74, 144, 217, 0.25), 0 0 4px rgba(74, 144, 217, 0.1);
}

.session-card.active-session {
  border-color: var(--accent-read);
}

.session-status {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 50px;
}

.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-read);
  animation: pulse-live 1.5s ease-in-out infinite;
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(39, 174, 96, 0); }
}

.session-age {
  font-size: 9px;
  color: var(--text-dim);
}

.session-info {
  min-width: 0;
}

.session-msg {
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.session-meta {
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.session-meta span {
  white-space: nowrap;
}

.session-actions {
  display: flex;
  gap: 6px;
}

.session-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-panel);
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
}

.session-btn:hover {
  color: var(--text);
  border-color: var(--accent-user);
}

.session-btn.live-btn {
  border-color: var(--accent-read);
  color: var(--accent-read);
}

.session-btn.live-btn:hover {
  background: var(--accent-read);
  color: #fff;
}

.session-tools {
  display: flex;
  gap: 3px;
  margin-top: 3px;
}

.session-tool-chip {
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 2px;
  color: #fff;
  opacity: 0.8;
}

/* ── Live Indicator ── */
#live-indicator {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 2px 10px;
  background: rgba(39, 174, 96, 0.15);
  border: 1px solid var(--accent-read);
  border-radius: 4px;
  font-size: 10px;
  color: var(--accent-read);
  font-weight: 600;
}

#live-indicator.visible {
  display: flex;
}

#live-indicator .live-dot {
  width: 6px;
  height: 6px;
}

/* ── Prompt Bar ── */
.control-group.prompt {
  gap: 6px;
}

.control-group.prompt.hidden {
  display: none;
}

.control-group.prompt.visible {
  display: flex;
}

#prompt-input {
  width: 200px;
  padding: 3px 8px;
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  font-family: inherit;
  outline: none;
}

#prompt-input:focus {
  border-color: var(--accent-user);
}

.prompt-btn {
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}

.prompt-btn.send {
  background: var(--accent-user);
  border-color: var(--accent-user);
  color: #fff;
}

.prompt-btn.send:hover {
  opacity: 0.85;
}

.prompt-btn.send:disabled {
  opacity: 0.4;
  cursor: default;
}

.prompt-btn.stop {
  background: var(--accent-bash);
  border-color: var(--accent-bash);
  color: #fff;
}

.prompt-btn.stop:hover {
  opacity: 0.85;
}

.prompt-btn.stop.hidden {
  display: none;
}

#prompt-status {
  color: var(--text-dim);
  font-size: 10px;
  white-space: nowrap;
}

.prompt-toggle {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
}

.prompt-toggle input[type="checkbox"] {
  accent-color: var(--accent-user);
  cursor: pointer;
}

/* ── Claude Output Bar (interactive response) ── */
#claude-output-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 12px;
  background: rgba(231, 76, 60, 0.1);
  border-bottom: 1px solid var(--accent-bash);
  font-size: 11px;
}

#claude-output-bar.hidden {
  display: none;
}

#claude-output-text {
  flex: 1;
  color: var(--accent-bash);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#respond-input {
  width: 200px;
  padding: 3px 8px;
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--accent-bash);
  border-radius: 4px;
  font-size: 11px;
  font-family: inherit;
  outline: none;
}

#respond-input:focus {
  border-color: var(--accent-user);
}

/* ── Continue Button on Session Cards ── */
.session-btn.continue-btn {
  border-color: var(--accent-user);
  color: var(--accent-user);
}

.session-btn.continue-btn:hover {
  background: var(--accent-user);
  color: #fff;
}

.session-continue-input {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  grid-column: 1 / -1;
}

.session-continue-input input {
  flex: 1;
  padding: 4px 8px;
  background: var(--bg-panel);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  font-family: inherit;
  outline: none;
}

.session-continue-input input:focus {
  border-color: var(--accent-user);
}

.session-continue-input button {
  padding: 4px 10px;
  background: var(--accent-user);
  border: 1px solid var(--accent-user);
  border-radius: 4px;
  color: #fff;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  #main {
    grid-template-columns: 1fr;
    grid-template-rows: 200px 1fr;
  }
  #message-log {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
}
</style>
</head>
<body>

<div id="landing">
  <div id="landing-inner">
    <div id="drop-zone">
      <h1>Claude Code Session Visualizer</h1>
      <p>Watch a Claude Code session replay as an animated graph</p>
      <label for="file-input">Choose .jsonl file</label>
      <input type="file" id="file-input" accept=".jsonl">
      <div class="hint">or drag &amp; drop a session file</div>
    </div>
    <div id="new-session-bar" class="hidden">
      <div class="session-continue-input" style="max-width:500px;width:100%">
        <input type="text" id="new-session-input" placeholder="Start a new Claude session...">
        <button id="btn-new-session">Start</button>
      </div>
    </div>
    <div id="session-browser" class="hidden">
      <div id="browser-header">
        <h2>Sessions</h2>
        <button id="btn-refresh" title="Refresh">Refresh</button>
      </div>
      <div id="session-list"></div>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <header id="controls">
    <div class="control-group transport">
      <button id="btn-start" title="Jump to start (Home)">&#9198;</button>
      <button id="btn-prev" title="Step back (Left)">&#9664;</button>
      <button id="btn-play" title="Play/Pause (Space)">&#9654;</button>
      <button id="btn-next" title="Step forward (Right)">&#9654;</button>
      <button id="btn-end" title="Jump to end (End)">&#9197;</button>
    </div>
    <div class="control-group speed">
      <label>Speed</label>

<script>
// ─────────────────────────────────────────────
// SessionParser
// ─────────────────────────────────────────────
class SessionParser {
  parse(text) {
    const lines = text.split('\n').filter(l => l.trim());
    const entries = [];
    for (const line of lines) {
      try { entries.push(JSON.parse(line)); } catch (e) { /* skip malformed */ }
    }

    const session = {
      sessionId: '',
      version: '',
      cwd: '',
      model: '',
      steps: [],
      totalTokens: { input: 0, output: 0, cacheCreation: 0, cacheRead: 0 },
    };

    let stepIndex = 0;

    for (const entry of entries) {
      // Skip non-visualizable
      if (['progress', 'file-history-snapshot', 'queue-operation', 'system'].includes(entry.type)) continue;

      // Capture session metadata
      if (!session.sessionId && entry.sessionId) session.sessionId = entry.sessionId;
      if (!session.version && entry.version) session.version = entry.version;
      if (!session.cwd && entry.cwd) session.cwd = entry.cwd;

      const msg = entry.message;
      if (!msg) continue;

      // Capture model
      if (msg.model && !session.model) session.model = msg.model;

      // Accumulate tokens
      if (msg.usage) {
        session.totalTokens.input += msg.usage.input_tokens || 0;
        session.totalTokens.output += msg.usage.output_tokens || 0;
        session.totalTokens.cacheCreation += msg.usage.cache_creation_input_tokens || 0;
        session.totalTokens.cacheRead += msg.usage.cache_read_input_tokens || 0;
      }

      const ts = entry.timestamp ? new Date(entry.timestamp) : null;

      if (entry.type === 'user') {
        // User message: could be text or tool_result(s)
        if (typeof msg.content === 'string') {
          session.steps.push({
            index: stepIndex++, type: 'user_message', timestamp: ts,
            uuid: entry.uuid, text: msg.content, tokens: null,
          });
        } else if (Array.isArray(msg.content)) {
          // Check for text
          const textBlocks = msg.content.filter(b => b.type === 'text');
          const resultBlocks = msg.content.filter(b => b.type === 'tool_result');

          if (textBlocks.length > 0) {
            const combinedText = textBlocks.map(b => b.text).join('\n');
            if (combinedText.trim()) {
              session.steps.push({
                index: stepIndex++, type: 'user_message', timestamp: ts,
                uuid: entry.uuid, text: combinedText, tokens: null,
              });
            }
          }

          for (const rb of resultBlocks) {
            const preview = typeof rb.content === 'string' ? rb.content : JSON.stringify(rb.content);
            session.steps.push({
              index: stepIndex++, type: 'tool_result', timestamp: ts,
              uuid: entry.uuid, toolUseId: rb.tool_use_id,
              resultPreview: preview.slice(0, 500),
              isError: rb.is_error || false, tokens: null,
            });
          }
        }
      } else if (entry.type === 'assistant') {
        if (!msg.content || !Array.isArray(msg.content)) continue;

        const tokenInfo = msg.usage ? {
          input: msg.usage.input_tokens || 0,
          output: msg.usage.output_tokens || 0,
        } : null;

        for (const block of msg.content) {
          if (block.type === 'thinking' && block.thinking) {
            session.steps.push({
              index: stepIndex++, type: 'thinking', timestamp: ts,
              uuid: entry.uuid, thinkingPreview: block.thinking.slice(0, 300),
              tokens: null,
            });
          } else if (block.type === 'text' && block.text && block.text.trim()) {
            session.steps.push({
              index: stepIndex++, type: 'assistant_text', timestamp: ts,
              uuid: entry.uuid, text: block.text, tokens: tokenInfo,
            });
          } else if (block.type === 'tool_use') {
            const inp = block.input || {};
            const filePaths = this.extractFilePaths(block.name, inp);
            const step = {
              index: stepIndex++, type: 'tool_use', timestamp: ts,
              uuid: entry.uuid, toolName: block.name,
              toolUseId: block.id, input: inp,
              filePaths, tokens: tokenInfo,
            };
            // Parse bash commands into structured sub-commands
            if (block.name === 'Bash' && inp.command) {
              step.bashCommands = this.parseBashCommand(inp.command);
            }
            session.steps.push(step);
          }
        }
      }
    }

    return session;
  }

  extractFilePaths(toolName, input) {
    const paths = [];
    switch (toolName) {
      case 'Read':
      case 'Write':
      case 'NotebookEdit':
        if (input.file_path) paths.push(input.file_path);
        if (input.notebook_path) paths.push(input.notebook_path);
        break;
      case 'Edit':
        if (input.file_path) paths.push(input.file_path);
        break;
      case 'Glob':
        if (input.path) paths.push(input.path);
        break;
      case 'Grep':
        if (input.path) paths.push(input.path);
        break;
      case 'Bash':
        paths.push(...this.extractPathsFromCommand(input.command || ''));
        break;
      case 'WebFetch':
        if (input.url) paths.push(input.url);
        break;
    }
    return [...new Set(paths.map(p => p.replace(/\/+$/, '')))];
  }

  extractPathsFromCommand(cmd) {
    const paths = [];
    for (const m of cmd.matchAll(/"(\/[^"]{2,})"/g)) paths.push(m[1]);
    for (const m of cmd.matchAll(/'(\/[^']{2,})'/g)) paths.push(m[1]);
    for (const m of cmd.matchAll(/(?:cat|ls|cd|mkdir|rm|cp|mv|head|tail|wc|chmod|touch|python|node|git\s+\S+)\s+(\/\S+)/g)) {
      paths.push(m[1]);
    }
    return paths.filter(p => p.length > 2 && !p.startsWith('/dev/'));
  }

  /**
   * Parse a bash command string into structured sub-commands.
   * Splits on &&, ||, ;, and | to produce individual command objects.
   * Each has: { program, args, display, targets[], category }
   */
  parseBashCommand(cmdStr) {
    if (!cmdStr) return [];

    // Split on chain operators, respecting quotes AND $() subshells
    const tokens = [];
    let current = '';
    let inSingle = false, inDouble = false;
    let parenDepth = 0;
    for (let i = 0; i < cmdStr.length; i++) {
      const c = cmdStr[i];
      if (c === "'" && !inDouble && parenDepth === 0) { inSingle = !inSingle; current += c; continue; }
      if (c === '"' && !inSingle && parenDepth === 0) { inDouble = !inDouble; current += c; continue; }
      if (inSingle) { current += c; continue; }

      // Track $() and () subshell depth
      if (c === '(' ) { parenDepth++; current += c; continue; }
      if (c === ')' && parenDepth > 0) { parenDepth--; current += c; continue; }
      if (parenDepth > 0 || inDouble) { current += c; continue; }

      if (c === '|' && cmdStr[i+1] === '|') {
        if (current.trim()) tokens.push({ text: current.trim(), op: null });
        tokens.push({ text: null, op: '||' });
        current = ''; i++; continue;
      }
      if (c === '&' && cmdStr[i+1] === '&') {
        if (current.trim()) tokens.push({ text: current.trim(), op: null });
        tokens.push({ text: null, op: '&&' });
        current = ''; i++; continue;
      }
      if (c === ';') {
        if (current.trim()) tokens.push({ text: current.trim(), op: null });
        tokens.push({ text: null, op: ';' });
        current = ''; continue;
      }
      if (c === '|') {
        if (current.trim()) tokens.push({ text: current.trim(), op: null });
        tokens.push({ text: null, op: '|' });
        current = ''; continue;
      }
      current += c;
    }
    if (current.trim()) tokens.push({ text: current.trim(), op: null });

    const commands = [];
    let prevOp = null;

    for (const tok of tokens) {
      if (tok.op) { prevOp = tok.op; continue; }

      const raw = tok.text;
      // Skip variable assignments (VAR=value, VAR=$(cmd), etc)
      if (/^\w+=/.test(raw)) continue;
      // Strip leading inline env vars (VAR=val cmd ...) but keep the command
      const cleaned = raw.replace(/^(\s*\w+=\S*\s+)+/, '').replace(/\s*[<>].*$/, '').trim();
      if (!cleaned) continue;

      const parts = this.splitArgs(cleaned);
      let program = parts[0];
      const args = parts.slice(1);

      // Skip shell syntax keywords
      const SKIP = ['if','then','else','elif','fi','do','done','for','while','case','esac',
                     'in','true','false','[','[[',']]',']','!','set','{','}','export','local',
                     'return','break','continue','shift','declare','typeset','readonly','unset'];
      if (SKIP.includes(program)) continue;

      // Skip fragments: $, =, parens, leading dash, path fragments, short garbage, bare numbers
      if (/[${}()=\[\]"']/.test(program) || program.length <= 1
          || program.startsWith('-') || program.includes('/')
          || /^\d+$/.test(program)) continue;

      if (['sudo', 'env', 'nohup', 'time', 'timeout'].includes(program) && parts.length > 1) {
        program = parts[1];
        args.shift();
        if (SKIP.includes(program) || /[${}()=\[\]]/.test(program)) continue;
      }

      // Extract targets — but skip for inline code commands
      const targets = [];
      const isInlineCode = (program === 'node' && args.includes('-e'))
        || (program === 'python3' && args.includes('-c'))
        || (program === 'python' && args.includes('-c'))
        || (program === 'ruby' && args.includes('-e'))
        || (program === 'perl' && args.includes('-e'));

      if (!isInlineCode) {
        const REAL_EXTS = /\.(js|ts|jsx|tsx|py|rb|go|rs|java|c|h|cpp|hpp|css|html|htm|json|yaml|yml|toml|xml|md|txt|sh|bash|zsh|sql|csv|log|conf|cfg|ini|env|lock|gitignore|jsonl|svg|png|jpg|jpeg|gif|pdf|wasm|mjs|cjs)$/i;
        for (const arg of args) {
          const unquoted = arg.replace(/^["']|["']$/g, '');
          // Skip flags
          if (unquoted.startsWith('-')) continue;
          // Absolute paths
          if (unquoted.startsWith('/') && unquoted.length > 2 && !unquoted.startsWith('/dev/')) {
            targets.push(unquoted);
          // Relative paths
          } else if (unquoted.startsWith('./') || unquoted.startsWith('../')) {
            targets.push(unquoted);
          // Files with real extensions (not JS property access like args.length)
          } else if (REAL_EXTS.test(unquoted)) {
            targets.push(unquoted);
          }
        }
        // Quoted absolute paths from raw string
        for (const m of raw.matchAll(/"(\/[^"]{2,})"/g)) {
          if (!targets.includes(m[1])) targets.push(m[1]);
        }
        for (const m of raw.matchAll(/'(\/[^']{2,})'/g)) {
          if (!targets.includes(m[1])) targets.push(m[1]);
        }
      }

      const category = this.categorizeCommand(program);

      // Include subcommand for multi-word tools
      let display = program;
      const subCmdTools = ['git', 'npm', 'npx', 'yarn', 'docker', 'kubectl', 'cargo', 'brew', 'pip', 'pip3'];
      if (subCmdTools.includes(program) && args.length > 0 && !args[0].startsWith('-')) {
        display = `${program} ${args[0]}`;
      }

      commands.push({
        program,
        display,
        args: raw,
        targets,
        category,
        pipeOp: prevOp,
      });
      prevOp = null;
    }

    return commands;
  }

  /** Split a command string into arguments, respecting quotes */
  splitArgs(str) {
    const args = [];
    let current = '';
    let inSingle = false, inDouble = false;
    for (const c of str) {
      if (c === "'" && !inDouble) { inSingle = !inSingle; current += c; continue; }
      if (c === '"' && !inSingle) { inDouble = !inDouble; current += c; continue; }
      if ((c === ' ' || c === '\t') && !inSingle && !inDouble) {
        if (current) { args.push(current); current = ''; }
        continue;
      }
      current += c;
    }
    if (current) args.push(current);
    return args;
  }

  categorizeCommand(program) {
    const categories = {
      git: 'vcs',
      gh: 'vcs',
      svn: 'vcs',
      npm: 'pkg',
      npx: 'pkg',
      yarn: 'pkg',
      pip: 'pkg',
      pip3: 'pkg',
      brew: 'pkg',
      cargo: 'pkg',
      python: 'exec',
      python3: 'exec',
      node: 'exec',
      ruby: 'exec',
      java: 'exec',
      go: 'exec',
      make: 'build',
      cmake: 'build',
      gcc: 'build',
      rustc: 'build',
      tsc: 'build',
      webpack: 'build',
      ls: 'fs', cd: 'fs', pwd: 'fs', mkdir: 'fs', rm: 'fs',
      cp: 'fs', mv: 'fs', touch: 'fs', chmod: 'fs', chown: 'fs',
      cat: 'fs', head: 'fs', tail: 'fs', wc: 'fs', find: 'fs', du: 'fs',
      grep: 'search', rg: 'search', ag: 'search', awk: 'search', sed: 'search',
      curl: 'net', wget: 'net', ssh: 'net', scp: 'net',
      docker: 'infra', kubectl: 'infra',
      echo: 'io', printf: 'io', tee: 'io',
      ps: 'sys', kill: 'sys', top: 'sys', lsof: 'sys', pgrep: 'sys',
      xargs: 'sys', sort: 'sys', uniq: 'sys', tr: 'sys', cut: 'sys',
    };
    return categories[program] || 'other';
  }
}

// ─────────────────────────────────────────────
// GraphModel
// ─────────────────────────────────────────────
const TOOL_COLORS = {
  Read: '#27ae60', Write: '#e67e22', Edit: '#f1c40f',
  Bash: '#e74c3c', Grep: '#9b59b6', Glob: '#9b59b6',
  Task: '#e84393', WebFetch: '#00b894', WebSearch: '#00b894',
  NotebookEdit: '#f1c40f', Skill: '#e84393',
};

// Colors for bash sub-command categories
const CMD_COLORS = {
  vcs: '#f39c12',    // git, gh — amber
  pkg: '#1abc9c',    // npm, pip, brew — teal
  exec: '#e67e22',   // python, node — orange
  build: '#d35400',  // make, tsc — burnt orange
  fs: '#e74c3c',     // ls, cd, mkdir — red
  search: '#9b59b6', // grep, rg — purple
  net: '#3498db',    // curl, wget — blue
  infra: '#2c3e50',  // docker, kubectl — dark
  io: '#95a5a6',     // echo, printf — gray
  sys: '#7f8c8d',    // ps, kill — dark gray
  other: '#c0392b',  // fallback — dark red
};

const TOOL_EDGE_CLASS = {
  Read: 'edge-file-read', Write: 'edge-file-write', Edit: 'edge-file-edit',
  Grep: 'edge-file-search', Glob: 'edge-file-search',
  Bash: 'edge-file-bash',
};

function toolColor(name) {
  return TOOL_COLORS[name] || '#6a6a8a';
}

function fileId(path) {
  return 'file-' + path.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 80);
}

function basename(p) {
  if (!p) return '?';
  if (p.startsWith('http')) {
    try { return new URL(p).hostname; } catch { return p.slice(0, 30); }
  }
  const parts = p.split('/');
  return parts[parts.length - 1] || parts[parts.length - 2] || p.slice(-20);
}

function shortenPath(p) {
  if (!p) return '';
  if (p.startsWith('http')) return p;
  const parts = p.split('/');
  if (parts.length <= 3) return p;
  return '.../' + parts.slice(-3).join('/');
}

class GraphModel {
  constructor() { this.reset(); }

  reset() {
    this.nodes = [];
    this.edges = [];
    this.nodeMap = new Map();
    this.fileNodes = new Map();
    this.lastToolNodeId = null;
    this.stepFilesSeen = new Set();
  }

  addStepNodes(step) {
    if (step.type === 'tool_use') {
      if (step.toolName === 'Bash' && step.bashCommands && step.bashCommands.length > 0) {
        // Decompose Bash into individual command nodes
        this.addBashSubCommands(step);
      } else {
        // Standard single-node tool
        this.addSingleToolNode(step);
      }
    } else if (step.type === 'user_message') {
      this.lastToolNodeId = null;
    }
  }

  addSingleToolNode(step) {
    const nodeId = `step-${step.index}`;
    const node = {
      id: nodeId, type: `tool:${step.toolName}`, label: step.toolName,
      sublabel: this.toolSublabel(step), color: toolColor(step.toolName),
      stepIndex: step.index, shape: 'circle', r: 18,
    };
    this.nodes.push(node);
    this.nodeMap.set(nodeId, node);

    if (this.lastToolNodeId) {
      this.edges.push({
        source: this.lastToolNodeId, target: nodeId,
        type: 'flow', stepIndex: step.index, edgeClass: 'edge-flow',
      });
    }
    this.lastToolNodeId = nodeId;

    this.addFileEdges(nodeId, step.filePaths, step);
  }

  addBashSubCommands(step) {
    const cmds = step.bashCommands;
    let prevCmdId = this.lastToolNodeId;

    for (let i = 0; i < cmds.length; i++) {
      const cmd = cmds[i];
      const cmdId = `step-${step.index}-cmd-${i}`;
      const color = CMD_COLORS[cmd.category] || CMD_COLORS.other;

      const node = {
        id: cmdId, type: `cmd:${cmd.category}`, label: cmd.display,
        sublabel: cmd.targets.length > 0 ? cmd.targets.map(t => basename(t)).join(', ') : '',
        fullCommand: cmd.args,
        color, stepIndex: step.index, shape: 'hexagon', r: 16,
      };
      this.nodes.push(node);
      this.nodeMap.set(cmdId, node);

      // Chain from previous (either prior tool or prior sub-command)
      if (prevCmdId) {
        const isPipe = cmd.pipeOp === '|';
        this.edges.push({
          source: prevCmdId, target: cmdId,
          type: isPipe ? 'pipe' : 'flow',
          stepIndex: step.index,
          edgeClass: isPipe ? 'edge-pipe' : 'edge-flow',
        });
      }
      prevCmdId = cmdId;

      // Connect sub-command to its file targets
      this.addFileEdges(cmdId, cmd.targets, step);
    }

    this.lastToolNodeId = prevCmdId;
  }

  addFileEdges(sourceId, paths, step) {
    for (const fp of paths) {
      const fid = fileId(fp);
      if (!this.fileNodes.has(fid)) {
        const fnode = {
          id: fid, type: 'file', label: basename(fp), fullPath: fp,
          sublabel: shortenPath(fp), color: '#74b9ff',
          stepIndex: step.index, shape: 'rect',
          readCount: 0, writeCount: 0, editCount: 0,
        };
        this.nodes.push(fnode);
        this.nodeMap.set(fid, fnode);
        this.fileNodes.set(fid, fnode);
      }
      const fnode = this.fileNodes.get(fid);
      if (step.toolName === 'Read' || step.toolName === 'Grep' || step.toolName === 'Glob') fnode.readCount++;
      else if (step.toolName === 'Write') fnode.writeCount++;
      else if (step.toolName === 'Edit') fnode.editCount++;

      const edgeClass = TOOL_EDGE_CLASS[step.toolName] || 'edge-file-default';
      this.edges.push({
        source: sourceId, target: fid,
        type: 'file_ref', stepIndex: step.index, edgeClass,
      });
    }
  }

  toolSublabel(step) {
    const inp = step.input;
    switch (step.toolName) {
      case 'Read': return basename(inp.file_path);
      case 'Write': return basename(inp.file_path);
      case 'Edit': return basename(inp.file_path);
      case 'Bash': return (inp.command || '').slice(0, 30);
      case 'Grep': return `/${(inp.pattern || '').slice(0, 20)}/`;
      case 'Glob': return (inp.pattern || '').slice(0, 25);
      case 'WebFetch': return basename(inp.url);
      case 'WebSearch': return (inp.query || '').slice(0, 25);
      case 'Task': return (inp.description || inp.prompt || '').slice(0, 25);
      default: return '';
    }
  }

  getVisibleNodes(upToStep) {
    return this.nodes.filter(n => n.stepIndex <= upToStep);
  }

  getVisibleEdges(upToStep) {
    const visibleIds = new Set(this.getVisibleNodes(upToStep).map(n => n.id));
    return this.edges.filter(e =>
      e.stepIndex <= upToStep &&
      visibleIds.has(typeof e.source === 'object' ? e.source.id : e.source) &&
      visibleIds.has(typeof e.target === 'object' ? e.target.id : e.target)
    );
  }
}

// ─────────────────────────────────────────────
// GraphRenderer
// ─────────────────────────────────────────────
class GraphRenderer {
  constructor(svgElement) {
    this.svg = d3.select(svgElement);
    this.width = 0;
    this.height = 0;
    this.g = this.svg.append('g');
    this.simulation = null;
    this.currentStep = -1;
    this.currentLayout = 'force';

    // SVG defs
    const defs = this.svg.append('defs');

    // Glow filter
    const glow = defs.append('filter').attr('id', 'glow')
      .attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
    glow.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
    const merge = glow.append('feMerge');
    merge.append('feMergeNode').attr('in', 'blur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Arrow marker
    defs.append('marker').attr('id', 'arrow').attr('viewBox', '0 0 10 6')
      .attr('refX', 10).attr('refY', 3).attr('markerWidth', 8).attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path').attr('d', 'M0,0L10,3L0,6').attr('fill', '#555577');

    // Edge and node groups
    this.edgeGroup = this.g.append('g').attr('class', 'edges');
    this.nodeGroup = this.g.append('g').attr('class', 'nodes');

    // Zoom
    this.zoom = d3.zoom()
      .scaleExtent([0.1, 5])
      .on('zoom', (e) => this.g.attr('transform', e.transform));
    this.svg.call(this.zoom);

    // Track size
    this.resizeObserver = new ResizeObserver(() => this.updateSize());
    this.resizeObserver.observe(svgElement);
    this.updateSize();
  }

  updateSize() {
    const rect = this.svg.node().getBoundingClientRect();
    this.width = rect.width;
    this.height = rect.height;
  }

  render(nodes, edges, currentStep) {
    this.currentStep = currentStep;

    if (this.currentLayout === 'force') {
      // Update simulation
      if (!this.simulation) {
        this.simulation = d3.forceSimulation()
          .force('link', d3.forceLink().id(d => d.id).distance(d => d.type === 'flow' ? 60 : 100).strength(0.4))
          .force('charge', d3.forceManyBody().strength(-250).distanceMax(400))
          .force('center', d3.forceCenter(this.width / 2, this.height / 2).strength(0.05))
          .force('collision', d3.forceCollide().radius(d => d.shape === 'rect' ? 50 : 25))
          .force('x', d3.forceX(this.width / 2).strength(0.03))
          .force('y', d3.forceY(this.height / 2).strength(0.03))
          .alphaDecay(0.015)
          .velocityDecay(0.35)
          .on('tick', () => this.tick());
      }

      // Give new nodes initial positions near center or near their linked nodes
      for (const n of nodes) {
        if (n.x === undefined) {
          const linkedEdge = edges.find(e => {
            const sid = typeof e.source === 'object' ? e.source.id : e.source;
            const tid = typeof e.target === 'object' ? e.target.id : e.target;
            return tid === n.id && nodes.find(nn => nn.id === sid && nn.x !== undefined);
          });
          if (linkedEdge) {
            const src = nodes.find(nn => nn.id === (typeof linkedEdge.source === 'object' ? linkedEdge.source.id : linkedEdge.source));
            if (src && src.x !== undefined) {
              n.x = src.x + (Math.random() - 0.5) * 80;
              n.y = src.y + 40 + Math.random() * 40;
            }
          }
          if (n.x === undefined) {
            n.x = this.width / 2 + (Math.random() - 0.5) * 200;
            n.y = this.height / 2 + (Math.random() - 0.5) * 200;
          }
        }
      }

      this.simulation.nodes(nodes);
      this.simulation.force('link').links(edges);
      this.simulation.alpha(0.3).restart();
    } else {
      // Non-force layouts: stop simulation, compute deterministic positions
      if (this.simulation) {
        this.simulation.stop();
      }
      this.computeLayoutPositions(nodes, edges, this.currentLayout);
    }

    // ── Edges ──
    const edgeSel = this.edgeGroup.selectAll('.edge-line')
      .data(edges, d => `${typeof d.source === 'object' ? d.source.id : d.source}-${typeof d.target === 'object' ? d.target.id : d.target}-${d.stepIndex}`);

    edgeSel.exit().transition().duration(200).attr('opacity', 0).remove();

    const edgeEnter = edgeSel.enter().append('line')
      .attr('class', d => `edge-line ${d.edgeClass}`)
      .attr('opacity', 0)
      .attr('marker-end', d => d.type === 'file_ref' ? 'url(#arrow)' : null);

    edgeEnter.transition().duration(300).attr('opacity', d => {
      if (d.edgeClass === 'edge-flow') return 0.3;
      return 0.6;
    });

    this.edgeElements = edgeEnter.merge(edgeSel);

    // ── Nodes ──
    const nodeSel = this.nodeGroup.selectAll('.node-group')
      .data(nodes, d => d.id);

    nodeSel.exit().transition().duration(200).attr('opacity', 0).remove();

    let dragMoved = false;
    const nodeEnter = nodeSel.enter().append('g')
      .attr('class', 'node-group')
      .attr('opacity', 0)
      .call(d3.drag()
        .on('start', (e, d) => {
          dragMoved = false;
          if (!e.active) this.simulation.alphaTarget(0.2).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on('drag', (e, d) => { dragMoved = true; d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => {
          if (!e.active) this.simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
      );

    // Append shapes
    nodeEnter.each(function(d) {
      const g = d3.select(this);
      if (d.shape === 'rect') {
        // File node
        g.append('rect')
          .attr('class', 'node-shape')
          .attr('width', 100).attr('height', 26)
          .attr('x', -50).attr('y', -13)
          .attr('rx', 5).attr('ry', 5)
          .attr('fill', d.color)
          .attr('fill-opacity', 0.15)
          .attr('stroke', d.color)
          .attr('stroke-width', 1.5);
        g.append('text').attr('class', 'node-label')
          .attr('dy', 1)
          .text(d.label.length > 14 ? d.label.slice(0, 13) + '\u2026' : d.label);
      } else if (d.shape === 'hexagon') {
        // Bash sub-command node (hexagon)
        const r = d.r || 16;
        const hex = d3.range(6).map(i => {
          const a = (Math.PI / 3) * i - Math.PI / 6;
          return [r * Math.cos(a), r * Math.sin(a)];
        });
        g.append('polygon')
          .attr('class', 'node-shape')
          .attr('points', hex.map(p => p.join(',')).join(' '))
          .attr('fill', d.color)
          .attr('fill-opacity', 0.25)
          .attr('stroke', d.color)
          .attr('stroke-width', 1.5);
        const maxLen = Math.max(6, Math.min(10, d.label.length));
        g.append('text').attr('class', 'node-label')
          .attr('dy', 0.5)
          .attr('font-size', d.label.length > 8 ? '7px' : '8px')
          .text(d.label.length > maxLen ? d.label.slice(0, maxLen - 1) + '\u2026' : d.label);
        if (d.sublabel) {
          g.append('text').attr('class', 'node-sublabel')
            .attr('dy', r + 11)
            .text(d.sublabel.length > 20 ? d.sublabel.slice(0, 19) + '\u2026' : d.sublabel);
        }
      } else {
        // Tool node (circle)
        g.append('circle')
          .attr('class', 'node-shape')
          .attr('r', d.r || 18)
          .attr('fill', d.color)
          .attr('fill-opacity', 0.2)
          .attr('stroke', d.color)
          .attr('stroke-width', 2);
        g.append('text').attr('class', 'node-label')
          .attr('dy', 0.5)
          .text(d.label.length > 6 ? d.label.slice(0, 5) : d.label);
        if (d.sublabel) {
          g.append('text').attr('class', 'node-sublabel')
            .attr('dy', (d.r || 18) + 12)
            .text(d.sublabel.length > 22 ? d.sublabel.slice(0, 21) + '\u2026' : d.sublabel);
        }
      }
    });

    // Tooltip events
    nodeEnter
      .on('mouseenter', (e, d) => showTooltip(e, d))
      .on('mousemove', (e) => moveTooltip(e))
      .on('mouseleave', () => hideTooltip());

    // Click: Cmd+click to open file, regular click to seek
    // (dragMoved distinguishes drag from click since d3.drag swallows click events)
    nodeEnter.on('pointerup', (e, d) => {
      if (dragMoved) return;
      if (e.metaKey || e.ctrlKey) {
        const path = d.type === 'file' ? d.fullPath : null;
        if (path) {
          e.preventDefault();
          openFile(path);
          return;
        }
      }
      if (window.appController) {
        window.appController.seekTo(d.stepIndex);
      }
    });

    // Animate entry
    nodeEnter.transition().duration(400).ease(d3.easeCubicOut).attr('opacity', 1);

    this.nodeElements = nodeEnter.merge(nodeSel);

    // Update opacity for active step
    this.updateHighlights(currentStep);

    // For non-force layouts, apply positions immediately
    if (this.currentLayout !== 'force') {
      this.applyPositions();
    }
  }

  updateHighlights(step) {
    if (!this.nodeElements) return;
    this.nodeElements.each(function(d) {
      const g = d3.select(this);
      const isActive = d.stepIndex === step;
      const isPast = d.stepIndex < step;
      const isFuture = d.stepIndex > step;

      // File nodes always stay visible once created
      if (d.type === 'file') {
        g.attr('opacity', d.stepIndex <= step ? 0.9 : 0);
        return;
      }

      if (isFuture) {
        g.attr('opacity', 0);
      } else if (isActive) {
        g.attr('opacity', 1);
        g.select('.node-shape').attr('filter', 'url(#glow)');
      } else if (isPast) {
        g.attr('opacity', 0.35);
        g.select('.node-shape').attr('filter', null);
      }
    });

    if (this.edgeElements) {
      this.edgeElements.each(function(d) {
        const el = d3.select(this);
        const visible = d.stepIndex <= step;
        el.attr('display', visible ? null : 'none');
        el.attr('opacity', d.stepIndex === step ? 0.8 : 0.25);
      });
    }
  }

  tick() {
    if (this.currentLayout !== 'force') return;
    if (this.edgeElements) {
      this.edgeElements
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
    }
    if (this.nodeElements) {
      this.nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
    }
  }

  applyPositions() {
    if (this.nodeElements) {
      this.nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
    }
    if (this.edgeElements) {
      this.edgeElements
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
    }
  }

  setLayout(name) {
    this.currentLayout = name;

    if (this.simulation) {
      this.simulation.stop();
    }

    // Gather current nodes from the data bound to the DOM
    const nodes = [];
    if (this.nodeElements) {
      this.nodeElements.each(function(d) { nodes.push(d); });
    }
    const edges = [];
    if (this.edgeElements) {
      this.edgeElements.each(function(d) { edges.push(d); });
    }

    if (nodes.length === 0) return;

    if (name === 'force') {
      // Re-create simulation and let it run
      this.simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(edges).id(d => d.id).distance(d => d.type === 'flow' ? 60 : 100).strength(0.4))
        .force('charge', d3.forceManyBody().strength(-250).distanceMax(400))
        .force('center', d3.forceCenter(this.width / 2, this.height / 2).strength(0.05))
        .force('collision', d3.forceCollide().radius(d => d.shape === 'rect' ? 50 : 25))
        .force('x', d3.forceX(this.width / 2).strength(0.03))
        .force('y', d3.forceY(this.height / 2).strength(0.03))
        .alphaDecay(0.015)
        .velocityDecay(0.35)
        .on('tick', () => this.tick());
      this.simulation.alpha(0.5).restart();
    } else {
      this.computeLayoutPositions(nodes, edges, name);
      // Animate to new positions
      this.nodeElements.transition().duration(500).ease(d3.easeCubicInOut)
        .attr('transform', d => `translate(${d.x},${d.y})`);
      this.edgeElements.transition().duration(500).ease(d3.easeCubicInOut)
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
    }
  }

  computeLayoutPositions(nodes, edges, layout) {
    switch (layout) {
      case 'circular': this.layoutCircular(nodes); break;
      case 'hierarchy': this.layoutHierarchy(nodes, edges); break;
      case 'timeline': this.layoutTimeline(nodes); break;
    }
  }

  layoutCircular(nodes) {
    const cx = this.width / 2;
    const cy = this.height / 2;
    const fileNodes = nodes.filter(n => n.type === 'file');
    const toolNodes = nodes.filter(n => n.type !== 'file');

    // Inner ring: tool/command nodes
    const innerR = Math.min(this.width, this.height) * 0.25;
    toolNodes.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / (toolNodes.length || 1) - Math.PI / 2;
      n.x = cx + innerR * Math.cos(angle);
      n.y = cy + innerR * Math.sin(angle);
    });

    // Outer ring: file nodes
    const outerR = Math.min(this.width, this.height) * 0.4;
    fileNodes.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / (fileNodes.length || 1) - Math.PI / 2;
      n.x = cx + outerR * Math.cos(angle);
      n.y = cy + outerR * Math.sin(angle);
    });
  }

  layoutHierarchy(nodes, edges) {
    // Build adjacency from flow edges to form a tree
    const flowEdges = edges.filter(e => e.type === 'flow' || e.type === 'pipe');
    const childMap = new Map(); // parent -> [children]
    const hasParent = new Set();

    for (const e of flowEdges) {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      if (!childMap.has(sid)) childMap.set(sid, []);
      childMap.get(sid).push(tid);
      hasParent.add(tid);
    }

    // Also attach file nodes to their first referencing tool
    const fileEdges = edges.filter(e => e.type === 'file_ref');
    const fileAttached = new Set();
    for (const e of fileEdges) {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      if (!fileAttached.has(tid)) {
        if (!childMap.has(sid)) childMap.set(sid, []);
        childMap.get(sid).push(tid);
        hasParent.add(tid);
        fileAttached.add(tid);
      }
    }

    // Find roots (tool nodes without parents)
    const toolNodes = nodes.filter(n => n.type !== 'file' && !hasParent.has(n.id));
    const nodeById = new Map(nodes.map(n => [n.id, n]));

    // Build d3.hierarchy data structure
    const rootData = { id: '__root__', children: [] };

    function buildTree(nodeId, visited) {
      if (visited.has(nodeId)) return null;
      visited.add(nodeId);
      const children = (childMap.get(nodeId) || [])
        .map(cid => buildTree(cid, visited))
        .filter(Boolean);
      return { id: nodeId, children: children.length > 0 ? children : undefined };
    }

    const visited = new Set();
    for (const root of toolNodes) {
      const subtree = buildTree(root.id, visited);
      if (subtree) rootData.children.push(subtree);
    }

    // Add any orphan nodes not in the tree
    for (const n of nodes) {
      if (!visited.has(n.id)) {
        rootData.children.push({ id: n.id });
      }
    }

    if (rootData.children.length === 0) return;

    const hierarchy = d3.hierarchy(rootData);
    const treeLayout = d3.tree().size([this.height * 0.85, this.width * 0.85]);
    treeLayout(hierarchy);

    // Apply positions (swap x/y for left-to-right orientation)
    hierarchy.descendants().forEach(d => {
      if (d.data.id === '__root__') return;
      const node = nodeById.get(d.data.id);
      if (node) {
        node.x = d.y + this.width * 0.075; // tree y -> screen x (left-to-right)
        node.y = d.x + this.height * 0.075; // tree x -> screen y
      }
    });
  }

  layoutTimeline(nodes) {
    const pad = 60;
    const toolNodes = nodes.filter(n => n.type !== 'file');
    const fileNodes = nodes.filter(n => n.type === 'file');

    // X axis: step index
    const stepIndices = [...new Set(toolNodes.map(n => n.stepIndex))].sort((a, b) => a - b);
    const xScale = d3.scaleLinear()
      .domain([stepIndices[0] || 0, stepIndices[stepIndices.length - 1] || 1])
      .range([pad, this.width - pad]);

    // Y axis: swim lanes by type
    const typeOrder = {};
    let laneIdx = 0;
    // Collect unique types preserving order of appearance
    for (const n of toolNodes) {
      if (!(n.type in typeOrder)) {
        typeOrder[n.type] = laneIdx++;
      }
    }
    const numLanes = Math.max(laneIdx, 1);
    const laneHeight = (this.height - pad * 2 - 80) / (numLanes + 1); // +1 for file lane

    // Position tool nodes
    // Track per-step-per-lane offsets for stacking
    const stepLaneCount = {};
    for (const n of toolNodes) {
      const lane = typeOrder[n.type];
      const key = `${n.stepIndex}-${lane}`;
      stepLaneCount[key] = (stepLaneCount[key] || 0);
      n.x = xScale(n.stepIndex) + stepLaneCount[key] * 8;
      n.y = pad + (lane + 0.5) * laneHeight;
      stepLaneCount[key]++;
    }

    // File nodes: bottom lane, spread by first-seen step
    fileNodes.forEach((n, i) => {
      n.x = xScale(n.stepIndex);
      n.y = pad + (numLanes + 0.5) * laneHeight;
    });
  }

  fitView() {
    if (!this.nodeElements || this.nodeElements.size() === 0) return;
    const bounds = this.g.node().getBBox();
    if (bounds.width === 0 || bounds.height === 0) return;
    const pad = 60;
    const scale = Math.min(
      this.width / (bounds.width + pad * 2),
      this.height / (bounds.height + pad * 2),
      1.5
    );
    const tx = this.width / 2 - (bounds.x + bounds.width / 2) * scale;
    const ty = this.height / 2 - (bounds.y + bounds.height / 2) * scale;
    this.svg.transition().duration(500)
      .call(this.zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  clear() {
    this.edgeGroup.selectAll('*').remove();
    this.nodeGroup.selectAll('*').remove();
    this.edgeElements = null;
    this.nodeElements = null;
    if (this.simulation) {
      this.simulation.stop();
      this.simulation = null;
    }
  }
}

// ─────────────────────────────────────────────
// MessageLog
// ─────────────────────────────────────────────
class MessageLog {
  constructor(container) {
    this.container = container;
    this.entries = [];
  }

  addStep(step) {
    const el = this.createEntry(step);
    if (!el) return;
    this.entries.push({ step, el });
    this.container.appendChild(el);
    this.updateHighlights(step.index);
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  createEntry(step) {
    const div = document.createElement('div');
    div.className = `msg-entry`;
    div.dataset.stepIndex = step.index;

    switch (step.type) {
      case 'user_message':
        div.innerHTML = `
          <div class="msg-header"><span class="msg-role user">User</span>
            ${step.timestamp ? `<span class="msg-time">${this.fmtTime(step.timestamp)}</span>` : ''}</div>
          <div class="msg-body">${esc(trunc(step.text, 200))}</div>`;
        break;
      case 'tool_use':
        div.innerHTML = `
          <div class="msg-header">
            <span class="tool-badge tool-${step.toolName.toLowerCase()}">${step.toolName}</span>
            ${step.timestamp ? `<span class="msg-time">${this.fmtTime(step.timestamp)}</span>` : ''}</div>
          <div class="msg-body"><code>${this.fmtToolInput(step)}</code></div>`;
        break;
      case 'tool_result':
        div.innerHTML = `
          <div class="msg-header"><span class="msg-role result">Result</span></div>
          <div class="msg-body result-body">${esc(trunc(step.resultPreview, 150))}</div>`;
        break;
      case 'assistant_text':
        div.innerHTML = `
          <div class="msg-header"><span class="msg-role assistant">Claude</span>
            ${step.timestamp ? `<span class="msg-time">${this.fmtTime(step.timestamp)}</span>` : ''}</div>
          <div class="msg-body">${esc(trunc(step.text, 200))}</div>`;
        break;
      case 'thinking':
        div.innerHTML = `
          <div class="msg-header"><span class="msg-role thinking">Thinking</span></div>
          <div class="msg-body thinking-body">${esc(trunc(step.thinkingPreview, 100))}</div>`;
        break;
      default:
        return null;
    }

    // Cmd+click file links to open, regular click to seek
    div.addEventListener('click', (e) => {
      const link = e.target.closest('.file-link');
      if (link) {
        e.preventDefault();
        e.stopPropagation();
        openFile(link.dataset.path);
        return;
      }
      if (window.appController) window.appController.seekTo(step.index);
    });

    return div;
  }

  updateHighlights(currentStep) {
    for (const { step, el } of this.entries) {
      el.classList.toggle('active', step.index === currentStep);
      el.classList.toggle('dimmed', step.index < currentStep);
    }
  }

  scrollToStep(stepIndex) {
    const entry = this.entries.find(e => e.step.index === stepIndex);
    if (entry) {
      entry.el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    this.updateHighlights(stepIndex);
  }

  clear() {
    this.container.innerHTML = '';
    this.entries = [];
  }

  fmtTime(ts) {
    if (!ts) return '';
    const h = ts.getHours().toString().padStart(2, '0');
    const m = ts.getMinutes().toString().padStart(2, '0');
    const s = ts.getSeconds().toString().padStart(2, '0');
    return `${h}:${m}:${s}`;
  }

  fileLink(path) {
    if (!path) return '';
    const name = basename(path);
    return `<a class="file-link" href="#" data-path="${esc(path)}" title="${esc(path)}">${esc(name)}</a>`;
  }

  fmtToolInput(step) {
    const inp = step.input;
    switch (step.toolName) {
      case 'Read': return this.fileLink(inp.file_path);
      case 'Write': return `${this.fileLink(inp.file_path)} (${(inp.content || '').length} chars)`;
      case 'Edit': return this.fileLink(inp.file_path);
      case 'Bash': return esc(trunc(inp.command || '', 80));
      case 'Grep': return `/${esc((inp.pattern || '').slice(0, 30))}/ in ${this.fileLink(inp.path || '.')}`;
      case 'Glob': return `${esc((inp.pattern || '').slice(0, 30))} in ${this.fileLink(inp.path || '.')}`;
      case 'WebFetch': return esc(trunc(inp.url || '', 60));
      case 'WebSearch': return esc(trunc(inp.query || '', 60));
      case 'Task': return esc(trunc(inp.description || inp.prompt || 'sub-agent', 60));
      default: return esc(step.toolName);
    }
  }
}

// ─────────────────────────────────────────────
// AnimationController
// ─────────────────────────────────────────────
class AnimationController {
  constructor(session, graphModel, renderer, messageLog) {
    this.session = session;
    this.model = graphModel;
    this.renderer = renderer;
    this.messageLog = messageLog;
    this.currentStep = -1;
    this.playing = false;
    this.timerId = null;
    this.speed = 600;
    this.accTokens = { input: 0, output: 0 };
    this.accFiles = new Set();
    this.accTools = {};

    window.appController = this;
  }

  play() {
    if (this.currentStep >= this.session.steps.length - 1) {
      // If at end, restart
      this.seekTo(-1);
    }
    this.playing = true;
    this.updatePlayButton();
    this.scheduleNext();
  }

  scheduleNext() {
    this.timerId = setTimeout(() => {
      if (!this.playing) return;
      if (this.currentStep >= this.session.steps.length - 1) {
        this.pause();
        return;
      }
      this.stepForward();
      if (this.playing) this.scheduleNext();
    }, this.speed);
  }

  pause() {
    this.playing = false;
    clearTimeout(this.timerId);
    this.updatePlayButton();
  }

  toggle() {
    this.playing ? this.pause() : this.play();
  }

  stepForward() {
    if (this.currentStep >= this.session.steps.length - 1) return;
    this.currentStep++;
    this.applyStep(this.currentStep);
  }

  stepBack() {
    if (this.currentStep < 0) return;
    this.currentStep--;
    this.rebuildToStep(this.currentStep);
  }

  jumpToStart() {
    this.pause();
    this.seekTo(-1);
  }

  jumpToEnd() {
    this.pause();
    this.seekTo(this.session.steps.length - 1);
  }

  seekTo(stepIndex) {
    const wasPlaying = this.playing;
    if (wasPlaying) this.pause();
    this.currentStep = stepIndex;
    this.rebuildToStep(stepIndex);
    // Don't auto-resume on seek
  }

  setSpeed(ms) {
    this.speed = ms;
  }

  applyStep(idx) {
    const step = this.session.steps[idx];
    if (!step) return;

    this.model.addStepNodes(step);
    this.updateAccumulators(step);

    const visNodes = this.model.getVisibleNodes(idx);
    const visEdges = this.model.getVisibleEdges(idx);
    this.renderer.render(visNodes, visEdges, idx);
    this.messageLog.addStep(step);
    this.updateControls();
  }

  rebuildToStep(idx) {
    this.model.reset();
    this.renderer.clear();
    this.messageLog.clear();
    this.accTokens = { input: 0, output: 0 };
    this.accFiles = new Set();
    this.accTools = {};

    for (let i = 0; i <= idx; i++) {
      const step = this.session.steps[i];
      this.model.addStepNodes(step);
      this.messageLog.addStep(step);
      this.updateAccumulators(step);
    }

    if (idx >= 0) {
      const visNodes = this.model.getVisibleNodes(idx);
      const visEdges = this.model.getVisibleEdges(idx);
      this.renderer.render(visNodes, visEdges, idx);
    }

    this.messageLog.scrollToStep(idx);
    this.updateControls();
  }

  updateAccumulators(step) {
    if (step.tokens) {
      this.accTokens.input += step.tokens.input || 0;
      this.accTokens.output += step.tokens.output || 0;
    }
    if (step.type === 'tool_use') {
      this.accTools[step.toolName] = (this.accTools[step.toolName] || 0) + 1;
      for (const fp of step.filePaths) this.accFiles.add(fp);
    }
  }

  updateControls() {
    const total = this.session.steps.length;
    const cur = this.currentStep + 1;
    document.getElementById('step-counter').textContent = `${cur} / ${total}`;

    const slider = document.getElementById('progress-slider');
    slider.max = total - 1;
    slider.value = this.currentStep;

    document.getElementById('btn-prev').disabled = this.currentStep < 0;
    document.getElementById('btn-start').disabled = this.currentStep < 0;
    document.getElementById('btn-next').disabled = this.currentStep >= total - 1;
    document.getElementById('btn-end').disabled = this.currentStep >= total - 1;

    // Stats
    const fmtK = n => n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n;
    document.getElementById('stat-tokens').textContent =
      `${fmtK(this.accTokens.input)} in / ${fmtK(this.accTokens.output)} out`;
    document.getElementById('stat-files').textContent = this.accFiles.size;

    const toolParts = Object.entries(this.accTools).map(([k, v]) => `${k}(${v})`);
    document.getElementById('stat-tools').textContent = toolParts.join(' ') || '0';

    // Duration
    if (this.currentStep >= 0) {
      const first = this.session.steps[0]?.timestamp;
      const current = this.session.steps[this.currentStep]?.timestamp;
      if (first && current) {
        const diffMs = current - first;
        const mins = Math.floor(diffMs / 60000);
        const secs = Math.floor((diffMs % 60000) / 1000);
        document.getElementById('stat-duration').textContent = `${mins}m ${secs}s`;
      }
    }
  }

  updatePlayButton() {
    const btn = document.getElementById('btn-play');
    btn.textContent = this.playing ? '\u23F8' : '\u25B6';
    btn.classList.toggle('playing', this.playing);
  }
}

// ─────────────────────────────────────────────
// Tooltip
// ─────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, d) {
  let html = '';
  if (d.type === 'file') {
    html = `<div class="tt-title">${esc(d.label)}</div>
      <div class="tt-detail">${esc(d.fullPath)}</div>
      <div class="tt-detail">Read: ${d.readCount} | Write: ${d.writeCount} | Edit: ${d.editCount}</div>`;
  } else if (d.type.startsWith('cmd:')) {
    html = `<div class="tt-title">${esc(d.label)}</div>
      <div class="tt-detail" style="font-family:monospace">${esc(d.fullCommand || '')}</div>`;
  } else if (d.type.startsWith('tool:')) {
    html = `<div class="tt-title">${esc(d.label)}</div>
      <div class="tt-detail">${esc(d.sublabel || '')}</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTooltip(event);
}

function moveTooltip(event) {
  tooltip.style.left = (event.clientX + 12) + 'px';
  tooltip.style.top = (event.clientY - 10) + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function trunc(s, max) {
  if (!s) return '';
  return s.length > max ? s.slice(0, max - 1) + '\u2026' : s;
}

function openFile(path) {
  fetch(`/api/open?path=${encodeURIComponent(path)}`)
    .then(r => r.json())
    .then(r => { if (r.error) console.warn('Open failed:', r.error); })
    .catch(e => console.warn('Open failed:', e));
}

// ─────────────────────────────────────────────
// Legend
// ─────────────────────────────────────────────
function buildLegend() {
  const items = [
    { label: 'Read', color: '#27ae60', shape: 'dot' },
    { label: 'Write', color: '#e67e22', shape: 'dot' },
    { label: 'Edit', color: '#f1c40f', shape: 'dot' },
    { label: 'Search', color: '#9b59b6', shape: 'dot' },
    { label: 'Task', color: '#e84393', shape: 'dot' },
    { label: 'Web', color: '#00b894', shape: 'dot' },
    { label: 'File', color: '#74b9ff', shape: 'rect' },
    { label: 'git', color: '#f39c12', shape: 'hex' },
    { label: 'fs', color: '#e74c3c', shape: 'hex' },
    { label: 'pkg', color: '#1abc9c', shape: 'hex' },
    { label: 'exec', color: '#e67e22', shape: 'hex' },
    { label: 'net', color: '#3498db', shape: 'hex' },
  ];

  const legend = document.getElementById('legend');
  legend.innerHTML = items.map(i => {
    let shape;
    if (i.shape === 'rect') {
      shape = `<span class="legend-rect" style="background:${i.color};opacity:0.4;border:1px solid ${i.color}"></span>`;
    } else if (i.shape === 'hex') {
      shape = `<svg width="10" height="10" viewBox="-6 -6 12 12"><polygon points="${
        d3.range(6).map(j => { const a = (Math.PI/3)*j - Math.PI/6; return [5*Math.cos(a), 5*Math.sin(a)].join(','); }).join(' ')
      }" fill="${i.color}" fill-opacity="0.5" stroke="${i.color}" stroke-width="1"/></svg>`;
    } else {
      shape = `<span class="legend-dot" style="background:${i.color}"></span>`;
    }
    return `<span class="legend-item">${shape} ${i.label}</span>`;
  }).join('');
}

// Init
// ─────────────────────────────────────────────
function initializeApp(session) {
  document.getElementById('session-info').textContent =
    `${session.model || 'unknown'} \u00B7 ${session.version || ''} \u00B7 ${session.steps.length} steps`;

  const graphModel = new GraphModel();
  const renderer = new GraphRenderer(document.getElementById('graph'));
  const messageLog = new MessageLog(document.getElementById('messages-container'));
  const controller = new AnimationController(session, graphModel, renderer, messageLog);

  buildLegend();
  wireControls(controller, renderer);
  controller.updateControls();

  // Show prompt bar if server is available
  if (serverAvailable) {
    if (!promptManager) promptManager = new PromptManager();
    promptManager.show();
  }

  // Auto-play after short delay
  setTimeout(() => controller.play(), 400);
}
