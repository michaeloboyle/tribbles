<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribbles</title>
<link rel="stylesheet" href="style.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<div id="landing">
  <div id="landing-inner">
    <div id="new-session-bar" class="hidden">
      <div class="session-continue-input" style="max-width:500px;width:100%">
        <input type="text" id="new-session-input" placeholder="Start a new Claude session...">
        <button id="btn-new-session">Start</button>
      </div>
    </div>
    <div id="session-browser" class="hidden">
      <div id="browser-header">
        <h2>Sessions</h2>
        <div id="day-nav">
          <button id="btn-day-prev" title="Older day (←)" disabled>←</button>
          <span id="day-nav-label"></span>
          <button id="btn-day-next" title="Newer day (→)" disabled>→</button>
        </div>
        <select id="theme-select" title="Color theme">
          <option value="__default__">Tribbles</option>
        </select>
        <button id="btn-refresh" title="Refresh">Refresh</button>
      </div>
      <div id="session-filters">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="active">Active</button>
        <button class="filter-chip" data-filter="today">Today</button>
        <button class="filter-chip" data-filter="week">This Week</button>
      </div>
      <div id="session-list"></div>
    </div>
  </div>
</div>

<div id="sidebar-resize"></div>
<div id="app" class="hidden">
  <header id="controls">
    <div class="control-group transport">
      <button id="btn-start" title="Jump to start (Home)">&#9198;</button>
      <button id="btn-prev" title="Step back (Left)">&#9664;</button>
      <button id="btn-play" title="Play/Pause (Space)">&#9654;</button>
      <button id="btn-next" title="Step forward (Right)">&#9654;</button>
      <button id="btn-end" title="Jump to end (End)">&#9197;</button>
    </div>
    <div class="control-group speed">
      <label>Speed</label>
      <input type="range" id="speed-slider" min="50" max="2000" value="600" step="50">
      <span id="speed-label">600ms</span>
    </div>
    <div class="control-group layout">
      <label>Layout</label>
      <select id="layout-select">
        <option value="force">Force</option>
        <option value="circular">Circular</option>
        <option value="hierarchy">Hierarchy</option>
        <option value="timeline">Timeline</option>
      </select>
    </div>
    <div class="control-group progress">
      <span id="step-counter">0 / 0</span>
      <input type="range" id="progress-slider" min="0" max="0" value="0">
    </div>
    <div id="live-indicator"><span class="live-dot"></span> LIVE</div>
    <div id="prompt-bar" class="control-group prompt hidden">
      <label class="prompt-toggle" title="When unchecked, Claude will ask before running tools">
        <input type="checkbox" id="skip-permissions"> Auto-approve
      </label>
      <input type="text" id="prompt-input" placeholder="Send a prompt to Claude...">
      <button id="btn-send" class="prompt-btn send">Send</button>
      <button id="btn-stop-prompt" class="prompt-btn stop hidden">Stop</button>
      <span id="prompt-status"></span>
    </div>
    <div class="control-group meta">
      <span id="session-info"></span>
      <button id="btn-reset" title="Close session">&times;</button>
    </div>
  </header>

  <div id="claude-output-bar" class="hidden">
    <div id="claude-output-text"></div>
    <input type="text" id="respond-input" placeholder="Type your response...">
    <button id="btn-respond" class="prompt-btn send">Reply</button>
  </div>

  <div id="main">
    <aside id="message-log">
      <h2>Activity Log</h2>
      <div id="messages-container"></div>
    </aside>
    <div id="graph-container">
      <svg id="graph"></svg>
      <div id="legend"></div>
    </div>
  </div>

  <footer id="stats-bar">
    <span>Tokens: <span class="stat-value" id="stat-tokens">0 in / 0 out</span></span>
    <span>Files: <span class="stat-value" id="stat-files">0</span></span>
    <span>Tools: <span class="stat-value" id="stat-tools">0</span></span>
    <span>Duration: <span class="stat-value" id="stat-duration">-</span></span>
  </footer>
</div>

<div id="tooltip"></div>

<button id="fix-review-badge" onclick="fixReview.toggle()">Fix Review</button>

<div id="fix-review-panel">
  <div id="fix-review-header" onclick="fixReview.toggle()">
    <h3>Fix Review</h3>
    <button id="fix-review-close">&times;</button>
  </div>
  <div id="fix-review-body">
    <div class="fix-review-status" id="fix-review-empty">No fixes to review</div>
  </div>
</div>

<!-- Built with help from ruflow and the Agentic Foundation -->
<script src="/devtools-bridge.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
